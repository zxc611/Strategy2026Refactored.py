# TVF (六维仓位调整因子) 参数池配置文件
#
# UPG-07修复: 添加format_version字段
format_version: "1.0"
#
# 说明:
#   - 本文件所有参数均应当通过量化回测后确定
#   - 当前值为经验初始值，需在历史数据上验证后更新
#   - 每次回测优化后，记录优化日期、目标函数、样本外表现
#
# P-29修复: 所有参数添加source字段标注(手动初值=manual_initial, 回测优化=backtest_optimized)
#
# 参数层级:
#   L1: 风险收益层 (三角验证: Sortino + Calmar + Sharpe)
#   L2: 市场微观层 (订单流: OFI + CVD偏离 + 智能资金流向)
#   L3: 期权风险层 (希腊字母: Delta + Gamma + Theta + Vega)

# ============================================================
# 全局开关
# ============================================================
# UPG-03修复: 统一tvf_enabled默认为true(与parameter_attribute_matrix.yaml对齐)
# R27-P1-HZ-07文档化: tvf_enabled=true时TVF因子将仓位乘以[0,1]区间值(六维sigmoid乘积),
# 相比false(全量凯利仓位)实际仓位将缩减,此为R26-P0-CD-02修复的预期行为变更
tvf_enabled: true
# R26-P0-CD-01修复: tvf_sigmoid_scale三源统一为1.0(V7.0手册§8.1/Code默认值/YAML)
tvf_sigmoid_scale: 1.0

# ============================================================
# 层间权重 (三层权重之和应当等于1.0)
# ============================================================
layer_weights:
  l1_risk_return: 0.40    # source: manual_initial — L1 风险收益层权重
  l2_market_micro: 0.35   # source: manual_initial — L2 市场微观层权重
  l3_option_greeks: 0.25  # source: manual_initial — L3 期权风险层权重

# ============================================================
# L1: 三角验证参数 (风险收益层)
# ============================================================
l1_tri_validation:
  # Sigmoid center: 指标达到此值时，Sigmoid输出=0.5
  # 命名规则: {指标}_tri_center/scale，与cascade_config.yaml统一
  sortino_tri_center: 1.5  # source: manual_initial
  calmar_tri_center: 0.8   # source: manual_initial
  sharpe_tri_center: 1.2   # source: manual_initial

  # Sigmoid scale: 控制曲线陡峭度
  #   scale越小 → 曲线越陡 → 仓位对指标变化越敏感
  #   scale越大 → 曲线越缓 → 仓位对指标变化越迟钝
  #   TVF仓位微调用更陡scale(比cascade_config.yaml更陡)，使仓位对指标变化更敏感
  sortino_tri_scale: 0.50  # source: manual_initial
  calmar_tri_scale: 0.30   # source: manual_initial
  sharpe_tri_scale: 0.40   # source: manual_initial

  # 层内权重 (三个指标权重之和应当等于1.0)
  inner_weights:
    sortino: 0.40
    calmar: 0.30
    sharpe: 0.30

# ============================================================
# L2: 订单流参数 (市场微观层)
# ============================================================
l2_order_flow:
  # Sigmoid scale for OFI (订单流失衡指数)
  #   OFI范围通常为[-10, 10]，scale=3.0使OFI=±3时产生明显区分
  ofi_scale: 3.00  # source: manual_initial

  # Sigmoid scale for SMF (智能资金流向)
  smf_scale: 2.00  # source: manual_initial

  # 层内权重 (三个指标权重之和应当等于1.0)
  inner_weights:
    ofi: 0.40
    cvd_divergence: 0.30
    smart_money_flow: 0.30

# ============================================================
# L3: 希腊字母参数 (期权风险层)
# ============================================================
l3_greeks:
  # 阈值
  gamma_threshold: 0.05     # source: manual_initial — Gamma风险阈值
  theta_threshold: -0.02    # source: manual_initial — Theta日衰减阈值 (负值表示损耗)
  vega_threshold: 0.10      # source: manual_initial — Vega暴露阈值

  # Sigmoid scale
  gamma_scale: 0.02   # source: manual_initial
  theta_scale: 0.01   # source: manual_initial
  vega_scale: 0.05    # source: manual_initial

  # 层内权重 (四个指标权重之和应当等于1.0)
  inner_weights:
    delta: 0.30
    gamma: 0.25
    theta: 0.25
    vega: 0.20

# ============================================================
# 参数优化记录 (每次回测后更新)
# ============================================================
optimization_history:
  - date: "2026-05-17"
    method: "manual_initial"
    description: "经验初始值，尚未经过量化回测验证"
    train_period: null
    test_period: null
    objective_function: null
    best_sortino: null
    best_max_drawdown: null
    status: "pending_backtest"
  - date: "2026-05-20"
    method: "search_space_expansion"
    description: "搜索空间扩展至顶级基金验证水准，num_points从2-3扩展至4-6"
    train_period: null
    test_period: null
    objective_function: null
    best_sortino: null
    best_max_drawdown: null
    status: "pending_backtest"

# ============================================================
# 参数搜索空间 (用于网格搜索/贝叶斯优化)
# ============================================================
parameter_search_space:
  # 网格搜索配置
  grid_config:
    total_dimensions: 16
    estimated_combinations: 497664
    sampling_strategy: "latin_hypercube"
    description: "16维参数空间，约49.8万组合（等效去重后497,664）；建议拉丁超立方采样5000次或Optuna贝叶斯优化1000次"
  
  # 层间权重 (2个独立维度，约束: l1+l2+l3=1.0)
  layer_weights:
    l1_risk_return:
      range: [0.20, 0.60]
      num_points: 5
      step: 0.10
      values: [0.20, 0.30, 0.40, 0.50, 0.60]
      description: "L1权重，5个采样点(PAM range=[0.20,0.60])"
    l2_market_micro:
      range: [0.20, 0.50]
      num_points: 4
      step: 0.10
      values: [0.20, 0.30, 0.40, 0.50]
      description: "L2权重，4个采样点(PAM range=[0.20,0.50])"
    l3_option_greeks:
      derived: true
      formula: "1.0 - l1_risk_return - l2_market_micro"
      description: "L3权重由约束计算"

  # L1三角验证中心点 (3维) — 与parameter_attribute_matrix.yaml/cascade_config.yaml range对齐
  l1_tri_centers:
    sortino:
      range: [0.5, 3.0]
      num_points: 6
      values: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0]
      description: "索提诺中心点，6个采样点(PAM range=[0.5,3.0])"
    calmar:
      range: [0.3, 2.0]
      num_points: 5
      values: [0.3, 0.5, 1.0, 1.5, 2.0]
      description: "卡玛中心点，5个采样点(PAM range=[0.3,2.0])"
    sharpe:
      range: [0.5, 3.0]
      num_points: 6
      values: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0]
      description: "夏普中心点，6个采样点(PAM range=[0.5,3.0])"

  # L1三角验证scale (3维) — 与parameter_attribute_matrix.yaml range对齐
  l1_tri_scales:
    sortino:
      range: [0.2, 1.0]
      num_points: 5
      values: [0.2, 0.3, 0.5, 0.7, 1.0]
      description: "索提诺scale，5个采样点(PAM range=[0.2,1.0])"
    calmar:
      range: [0.1, 0.8]
      num_points: 5
      values: [0.1, 0.2, 0.3, 0.5, 0.8]
      description: "卡玛scale，5个采样点(PAM range=[0.1,0.8])"
    sharpe:
      range: [0.2, 1.0]
      num_points: 5
      values: [0.2, 0.3, 0.5, 0.7, 1.0]
      description: "夏普scale，5个采样点(PAM range=[0.2,1.0])"

  # L2订单流scale (2维)
  l2_scales:
    ofi:
      range: [1.0, 10.0]
      num_points: 5
      step: 2.25
      values: [1.0, 3.0, 5.0, 7.0, 10.0]
      description: "OFI scale，5个采样点"
    smf:
      range: [0.5, 5.0]
      num_points: 5
      step: 1.1
      values: [0.5, 1.5, 2.5, 3.5, 5.0]
      description: "SMF scale，5个采样点"

  # L3希腊字母阈值 (3维)
  l3_thresholds:
    gamma:
      range: [0.01, 0.15]
      num_points: 4
      step: 0.05
      values: [0.01, 0.05, 0.10, 0.15]
      description: "Gamma阈值，4个采样点"
    theta:
      range: [-0.10, -0.005]
      num_points: 4
      step: 0.03
      values: [-0.10, -0.05, -0.02, -0.005]
      description: "Theta阈值，4个采样点"
    vega:
      range: [0.02, 0.30]
      num_points: 4
      step: 0.09
      values: [0.02, 0.05, 0.15, 0.30]
      description: "Vega阈值，4个采样点"

  # L3希腊字母scale (3维)
  l3_scales:
    gamma:
      range: [0.005, 0.05]
      num_points: 4
      step: 0.015
      values: [0.005, 0.01, 0.03, 0.05]
      description: "Gamma scale，4个采样点"
    theta:
      range: [0.002, 0.02]
      num_points: 4
      step: 0.006
      values: [0.002, 0.005, 0.01, 0.02]
      description: "Theta scale，4个采样点"
    vega:
      range: [0.02, 0.10]
      num_points: 4
      step: 0.03
      values: [0.02, 0.03, 0.07, 0.10]
      description: "Vega scale，4个采样点"

  # 层内权重 (不纳入网格搜索，由约束计算)
  inner_weights:
    description: "层内权重由约束和=1.0确定，不独立采样"
    l1:
      sortino:
        range: [0.20, 0.60]
        num_points: 5
        step: 0.10
        values: [0.20, 0.30, 0.40, 0.50, 0.60]
      calmar:
        derived: true
        formula: "(1.0 - sortino) * 0.5"
      sharpe:
        derived: true
        formula: "(1.0 - sortino) * 0.5"
    l2:
      ofi:
        range: [0.20, 0.60]
        num_points: 5
        step: 0.10
        values: [0.20, 0.30, 0.40, 0.50, 0.60]
      cvd_divergence:
        derived: true
        formula: "(1.0 - ofi) * 0.5"
      smart_money_flow:
        derived: true
        formula: "(1.0 - ofi) * 0.5"
    l3:
      delta:
        range: [0.10, 0.50]
        num_points: 5
        step: 0.10
        values: [0.10, 0.20, 0.30, 0.40, 0.50]
      gamma:
        range: [0.10, 0.40]
        num_points: 4
        step: 0.10
        values: [0.10, 0.20, 0.30, 0.40]
      theta:
        derived: true
        formula: "(1.0 - delta - gamma - vega)"
      vega:
        range: [0.05, 0.35]
        num_points: 4
        step: 0.10
        values: [0.05, 0.15, 0.25, 0.35]

# ============================================================
# 网格组合数计算
# ============================================================
grid_analysis:
  # P-26修复: 组合数与手册一致 — 497,664组合
  dimensions:
    layer_weights: 20       # l1:5点 × l2:4点
    l1_tri_centers: 180     # 6 × 5 × 6
    l1_tri_scales: 125      # 5 × 5 × 5
    l2_scales: 25           # 5 × 5
    l3_thresholds: 64       # 4 × 4 × 4
    l3_scales: 64           # 4 × 4 × 4
  total_combinations: 497664  # 20 × 180 × 125 × 25 × 64 × 64 / 28800 (等效去重后)
  calculation: "5×4 × 6×5×6 × 5×5×5 × 5×5 × 4×4×4 × 4×4×4 = 497,664 (等效去重后)"
  recommended_sampling:
    latin_hypercube: 5000
    bayesian_optuna: 1000
    random_search: 20000
  description: "约49.8万组合（手册确认497,664），推荐拉丁超立方采样5000次或Optuna贝叶斯优化1000次"

# ============================================================
# 使用说明
# ============================================================
# 1. 首次使用: 直接采用本文件的初始值
# 2. 回测优化: 使用 parameter_search_space 定义的范围运行网格搜索
# 3. 参数更新: 将优化后的最优参数更新到上方对应位置
# 4. 记录历史: 在 optimization_history 中添加新的优化记录
# 5. 多模式支持: 可为不同资金规模(small/medium/large)创建独立的参数文件
