[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=ali2026v3_trading --cov-report=term-missing --cov-report=html
norecursedirs = tests/fixtures
markers =
    slow: slow running tests
    integration: integration tests
    unit: unit tests
