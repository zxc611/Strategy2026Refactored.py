# =============================================================================
# CascadeJudge 瀑布式评判引擎参数 (cascade_judge.py / cascade_config.yaml)
# 三系统统一: 策略评判系统 / 策略回测系统 / 策略生产系统 共用
# =============================================================================

gate1_min_profit_ratio:
  type: float
  default: 1.8
  range: [0.5, 6.0]
  grid: [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5, 2.75, 3.0, 3.5, 4.0, 4.5, 5.0, 5.5, 6.0]
  layer: L0_judgment
  editable: runtime_readonly
  description: 盈亏比验证阈值(第一关硬否决) — 期权权利金盈亏比覆盖1.5:1至5:1
  source: backtest_grid
  evidence: "期权权利金策略: 卖险期权卖方PR≈1.5, 铁鹰PR≈2.0, 垂直价差PR≈2.5-4.0, 单腿买权PR可达5+; grid17点覆盖0.5-6.0全值域; sigmoid_pr_tri_center=此值"
  last_validated: "2026-05-20"

gate2_min_sortino:
  type: float
  default: 1.5
  range: [0.3, 5.0]
  grid: [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5, 2.75, 3.0, 3.5, 4.0, 4.5, 5.0]
  layer: L0_judgment
  editable: runtime_readonly
  description: 索提诺比率阈值(三角验证第一道) — 期权策略Sortino范围0.5-5.0
  source: backtest_grid
  evidence: "期权卖方Sortino≈1.0-2.0, 买权Sortino可达3+; grid15点覆盖0.5-5.0; sigmoid_sortino_tri_center=此值"
  last_validated: "2026-05-20"

gate2_min_calmar:
  type: float
  default: 0.8
  range: [0.1, 4.0]
  grid: [0.1, 0.25, 0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.5, 3.0, 3.5, 4.0]
  layer: L0_judgment
  editable: runtime_readonly
  description: 卡玛比率阈值(三角验证第二道) — 期权策略Calmar范围0.1-4.0
  source: backtest_grid
  evidence: "卖方Calmar≈0.5-1.5, 买权Calmar可达2+; grid13点覆盖0.1-4.0; sigmoid_calmar_tri_center=此值"
  last_validated: "2026-05-20"

gate2_min_sharpe:
  type: float
  default: 1.2
  range: [0.3, 5.0]
  grid: [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5, 2.75, 3.0, 3.5, 4.0, 4.5, 5.0]
  layer: L0_judgment
  editable: runtime_readonly
  description: 夏普比率阈值(三角验证第三道，仅WARN不BLOCK) — 期权策略Sharpe范围0.5-5.0
  source: backtest_grid
  evidence: "卖方Sharpe≈1.0-2.0, 买权Sharpe可达3+; grid15点覆盖0.5-5.0; sigmoid_sharpe_tri_center=此值"
  last_validated: "2026-05-20"

gate3_max_consecutive_losses:
  type: int
  default: 5
  range: [2, 15]
  grid: [2, 3, 4, 5, 6, 7, 8, 10, 12, 15]
  layer: L0_judgment
  editable: runtime_readonly
  description: 最大连续亏损次数(第三关心理承受线) — 期权买权需更大容忍度
  source: backtest_grid
  evidence: "卖方连续亏损3-5次, 买权因概率低可容忍8-12次; grid10点覆盖2-15"
  last_validated: "2026-05-20"

gate3_max_flat_days:
  type: int
  default: 20
  range: [3, 90]
  grid: [3, 5, 10, 15, 20, 30, 45, 60, 90]
  layer: L0_judgment
  editable: runtime_readonly
  description: 最大横盘天数(第三关机会成本约束) — 买权等趋势策略需更大容忍
  source: backtest_grid
  evidence: "卖方横盘容忍5-20天, 买权/趋势需30-60天; grid9点覆盖3-90; NAV曲线直接计算"
  last_validated: "2026-05-20"

gate3_max_margin_ratio:
  type: float
  default: 0.50
  range: [0.10, 0.95]
  grid: [0.10, 0.20, 0.30, 0.40, 0.50, 0.60, 0.70, 0.80, 0.90, 0.95]
