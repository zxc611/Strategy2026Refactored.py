# 参数属性矩阵 V7.3
# UPG-07修复: 添加format_version字段
format_version: "1.0"
# 定义每个参数的元属性：类型、范围、层级、可编辑性、互斥关系、量化来源
# 供 ParamsService/UI/风控层 统一校验和路由
#
# N-16标记: 当前35个参数source=intuition(无量化来源)，不可锁定生产值
# 量化路径: intuition → backtest_grid → goldilocks → quantified
# 优先级: L-1安全参数 > L0核心参数 > L1辅助参数
#
# 量化来源分类（铁律：无量化来源的参数不得锁定为生产值）：
#   quantified:       已通过独立数据集优化+反事实验证
#   backtest_grid:    已通过参数网格回测优选
#   goldilocks:       已通过量化金发姑娘测试
#   stress_scenario:  已通过情景压力库扫描
#   intuition:        基于经验/直觉设定，待量化（不可锁定生产值）
#   design:           V7架构设计决定（逻辑约束）

# =============================================================================
# L-1 安全元层参数（硬约束，不可运行时修改）
# =============================================================================

circuit_breaker_trigger_sigma:
  type: float
  default: 3.0
  range: [1.0, 10.0]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: 速率断路器触发阈值(σ倍数)
  source: goldilocks
  evidence: "σ=3.0覆盖99.7%正态分布，经典统计控制限"
  last_validated: "2026-05-10"

circuit_breaker_pause_sec:
  type: float
  default: 180.0
  range: [30.0, 3600.0]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: 断路器暂停时长(秒)
  source: goldilocks
  evidence: "3分钟暂停≈1个交易周期最小单位，允许流动性恢复"
  last_validated: "2026-05-10"

circuit_breaker_calm_period_sec:
  type: float
  default: 600.0
  range: [60.0, 7200.0]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: 断路器冷静期(秒)，冷静期内禁止新开仓
  source: goldilocks
  evidence: "10分钟冷静期=3×暂停时长，避免连环触发"
  last_validated: "2026-05-10"

daily_loss_hard_stop_pct:
  type: float
  default: 0.05
  range: [0.01, 0.20]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: 日最大回撤硬停止比例
  source: stress_scenario
  evidence: "5%日回撤≈2.5×日均波动，2020-2025历史回测验证"
  last_validated: "2026-05-10"

daily_drawdown_multiplier:
  type: float
  default: 2.0
  range: [1.0, 5.0]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: 日回撤放大系数(补丁二b)
  source: backtest_grid
  evidence: "Round1网格回测: multiplier=2.0在训练集夏普最优"
  last_validated: "2026-05-10"

# 原因：全局"分钟"参数无法匹配亚秒级HFT和秒级弹簧策略的物理时间尺度
# 替换为以下4个策略专用参数：

hft_hard_time_stop_ms:
  type: int
  default: 1000
  range: [100, 5000]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: HFT硬时间止损(毫秒)，物理依据：订单簿半衰期50-200ms
  source: physical
  evidence: "订单簿半衰期约50-200ms，HFT持仓不应超过5s"
  last_validated: "2026-05-21"

spring_hard_time_stop_sec:
  type: int
  default: 30
  range: [1, 120]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: 弹簧硬时间止损(秒)，物理依据：Gamma峰值持续10-60s
  source: physical
  evidence: "Gamma脉冲峰值持续约10-60s，持仓不应超过2min"
  last_validated: "2026-05-21"

resonance_hard_time_stop_min:
  type: int
  default: 5
  range: [1, 15]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: 共振硬时间止损(分钟)，统计依据：分钟级趋势持续性5-30min
  source: statistical
  evidence: "分钟级趋势持续性约5-30min，共振持仓不应超过15min"
  last_validated: "2026-05-21"

box_hard_time_stop_min:
  type: int
  default: 30
  range: [15, 60]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: 箱体硬时间止损(分钟)，统计依据：箱体形成周期30-120min
  source: statistical
  evidence: "箱体形成周期约30-120min，箱体持仓不应超过60min"
  last_validated: "2026-05-21"

min_profit_threshold:
  type: float
  default: 0.002
  range: [0.0, 0.05]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: 最小盈利阈值(补丁二b)
  source: intuition
  evidence: "0.2%≈1个tick最小跳动的权益占比，待金发姑娘测试"
  last_validated: "待验证"

max_net_delta_pct:
  type: float
  default: 0.30
  range: [0.10, 0.60]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: 组合净Delta上限(%)
  source: stress_scenario
  evidence: "情景压力库: Delta>30%在极端行情下亏损超日回撤硬限"
  last_validated: "2026-05-10"

max_net_gamma_pct:
  type: float
  default: 0.08
  range: [0.03, 0.20]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: 组合净Gamma上限(%)
  source: stress_scenario
  evidence: "情景压力库: Gamma>8%在波动率飙升3σ时亏损超硬限"
  last_validated: "2026-05-10"

max_net_vega_bps:
  type: float
  default: 0.02
  range: [0.001, 0.10]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: 组合净Vega上限(bps)
  source: stress_scenario
  evidence: "情景压力库: Vega>2bps在IV±50%时亏损超硬限"
  last_validated: "2026-05-10"

max_theta_ratio:
  type: float
  default: 0.5
  range: [0.05, 2.0]
  layer: L_minus1_safety
  editable: runtime_readonly
  description: Theta比率上限
  source: intuition
  evidence: "0.5=时间衰减不超过权利金50%，待压力库验证"
  last_validated: "待验证"

