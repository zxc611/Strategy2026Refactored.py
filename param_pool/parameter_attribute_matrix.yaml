  editable: runtime
  description: 回调入场策略开关
  source: backtest_grid
  evidence: "Round1+Round2网格: pullback_enabled=True时夏普提升0.12但交易频率降40%"
  last_validated: "2026-05-10"

pullback_wait_bars:
  type: int
  default: 5
  range: [2, 10]
  layer: subsystem_pullback
  editable: runtime
  description: 回调等待bar数(确认回调深度)
  source: backtest_grid
  evidence: "Round1: wait_bars=5在训练集回调捕获率最优(2过短→噪声，10过长→错过入场)"
  last_validated: "2026-05-10"

pullback_retrace_pct:
  type: float
  default: 0.15
  range: [0.1, 0.9]
  layer: subsystem_pullback
  editable: runtime
  description: 回调回撤百分比阈值(Call/Put共用)
  source: backtest_grid
  evidence: "Round1: 0.15在训练集回调入场盈率最优，0.5以上过深回调≈趋势反转"
  last_validated: "2026-05-10"

pullback_iv_min_percentile:
  type: float
  default: 20.0
  range: [1.0, 80.0]
  layer: subsystem_pullback
  editable: runtime
  description: 回调入场IV最低百分位(低于此值禁止回调入场)
  source: goldilocks
  evidence: "20%分位=排除IV极低区(流动性不足)，金发姑娘测试确认10-40%为有效区间"
  last_validated: "2026-05-10"

pullback_iv_max_percentile:
  type: float
  default: 80.0
  range: [20.0, 99.0]
  layer: subsystem_pullback
  editable: runtime
  description: 回调入场IV最高百分位(高于此值禁止回调入场)
  source: goldilocks
  evidence: "80%分位=排除IV极高区(隐含波动率飙升≈事件风险)，金发姑娘测试确认60-90%为有效区间"
  last_validated: "2026-05-10"

pullback_ref_mode:
  type: str
  default: "peak"
  range: ["peak", "atr"]
  layer: subsystem_pullback
  editable: runtime
  description: 回调参考模式(peak=峰值参考, atr=ATR动态参考)
  source: backtest_grid
  evidence: "Round2: peak模式在趋势行情夏普最优，atr模式在震荡行情更稳健"
  last_validated: "2026-05-10"

pullback_atr_wait_multiplier:
  type: float
  default: 0.0
  range: [0.0, 10.0]
  layer: subsystem_pullback
  editable: runtime
  description: ATR等待乘数(仅atr模式下生效，0=不使用ATR等待)
  source: backtest_grid
  evidence: "Round2: 0.0=禁用ATR等待，2.0和5.0在atr模式下有差异化收益"
  last_validated: "2026-05-10"

pullback_retrace_pct_call:
  type: optional_float
  default: 0.38
  range: [0.1, 0.9]
  layer: subsystem_pullback
  editable: runtime
  description: Call方向专用回调回撤百分比(null时使用pullback_retrace_pct)
  source: backtest_grid
  evidence: "P2-4修复: Call回撤默认值0.38，与shared_utils.py/PULLBACK_DEFAULTS对齐"
  last_validated: "2026-05-20"

pullback_retrace_pct_put:
  type: optional_float
  default: 0.42
  range: [0.1, 0.9]
  layer: subsystem_pullback
  editable: runtime
  description: Put方向专用回调回撤百分比(null时使用pullback_retrace_pct)
  source: backtest_grid
  evidence: "P2-4修复: Put回撤默认值0.42，与shared_utils.py/PULLBACK_DEFAULTS对齐"
  last_validated: "2026-05-20"

pullback_theta_decay_accel:
  type: float
  default: 0.0
  range: [0.0, 2.0]
  layer: subsystem_pullback
  editable: runtime
  description: Theta衰减加速因子(>0时时间衰减加速回调入场判定)
  source: backtest_grid
  evidence: "Round2辅助参数精扫: 0.0=禁用衰减加速，0.5和1.0在末日周期有差异化收益"
  last_validated: "2026-05-10"

pullback_min_retrace_abs:
  type: float
  default: 0.0
  range: [0.0, 2.0]
  layer: subsystem_pullback
  editable: runtime
  description: 回调最小绝对回撤(点数，0=不设下限)
  source: backtest_grid
  evidence: "Round2辅助参数精扫: 0.0=不设下限，0.5和1.0过滤微小回调噪声"
  last_validated: "2026-05-10"

pullback_max_valid_bars:
  type: int
  default: 24
  range: [5, 60]
  layer: subsystem_pullback
  editable: runtime
  description: 回调信号最大有效等待bar数(超过则信号过期失效)
  source: backtest_grid
  evidence: "物理约束: max_valid_bars>=wait_bars+2且<=resonance_hard_time_stop_min/10; 24≈4小时(6min/bar)覆盖半日回调窗口"
  last_validated: "2026-05-17"
  depends_on:
    - param: pullback_wait_bars
      constraint: "max_valid_bars >= wait_bars + 2"
    - param: resonance_hard_time_stop_min
      constraint: "max_valid_bars <= resonance_hard_time_stop_min / 10"

