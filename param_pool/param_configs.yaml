format_version: '1.0'
parameter_attributes:
  format_version: '1.0'
  circuit_breaker_trigger_sigma:
    type: float
    default: 3.0
    range:
    - 1.0
    - 10.0
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 速率断路器触发阈值(σ倍数)
    source: goldilocks
    evidence: σ=3.0覆盖99.7%正态分布，经典统计控制限
    last_validated: '2026-05-10'
  circuit_breaker_pause_sec:
    type: float
    default: 180.0
    range:
    - 30.0
    - 3600.0
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 断路器暂停时长(秒)
    source: goldilocks
    evidence: 3分钟暂停≈1个交易周期最小单位，允许流动性恢复
    last_validated: '2026-05-10'
  circuit_breaker_calm_period_sec:
    type: float
    default: 600.0
    range:
    - 60.0
    - 7200.0
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 断路器冷静期(秒)，冷静期内禁止新开仓
    source: goldilocks
    evidence: 10分钟冷静期=3×暂停时长，避免连环触发
    last_validated: '2026-05-10'
  daily_loss_hard_stop_pct:
    type: float
    default: 0.05
    range:
    - 0.01
    - 0.2
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 日最大回撤硬停止比例
    source: stress_scenario
    evidence: 5%日回撤≈2.5×日均波动，2020-2025历史回测验证
    last_validated: '2026-05-10'
  daily_drawdown_multiplier:
    type: float
    default: 2.0
    range:
    - 1.0
    - 5.0
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 日回撤放大系数(补丁二b)
    source: backtest_grid
    evidence: 'Round1网格回测: multiplier=2.0在训练集夏普最优'
    last_validated: '2026-05-10'
  hft_hard_time_stop_ms:
    type: int
    default: 1000
    range:
    - 100
    - 5000
    layer: L_minus1_safety
    editable: runtime_readonly
    description: HFT硬时间止损(毫秒)，物理依据：订单簿半衰期50-200ms
    source: physical
    evidence: 订单簿半衰期约50-200ms，HFT持仓不应超过5s
    last_validated: '2026-05-21'
  spring_hard_time_stop_sec:
    type: int
    default: 30
    range:
    - 1
    - 120
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 弹簧硬时间止损(秒)，物理依据：Gamma峰值持续10-60s
    source: physical
    evidence: Gamma脉冲峰值持续约10-60s，持仓不应超过2min
    last_validated: '2026-05-21'
  resonance_hard_time_stop_min:
    type: int
    default: 5
    range:
    - 1
    - 15
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 共振硬时间止损(分钟)，统计依据：分钟级趋势持续性5-30min
    source: statistical
    evidence: 分钟级趋势持续性约5-30min，共振持仓不应超过15min
    last_validated: '2026-05-21'
  box_hard_time_stop_min:
    type: int
    default: 30
    range:
    - 15
    - 60
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 箱体硬时间止损(分钟)，统计依据：箱体形成周期30-120min
    source: statistical
    evidence: 箱体形成周期约30-120min，箱体持仓不应超过60min
    last_validated: '2026-05-21'
  min_profit_threshold:
    type: float
    default: 0.002
    range:
    - 0.0
    - 0.05
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 最小盈利阈值(补丁二b)
    source: intuition
    evidence: 0.2%≈1个tick最小跳动的权益占比，待金发姑娘测试
    last_validated: 待验证
  max_net_delta_pct:
    type: float
    default: 0.3
    range:
    - 0.1
    - 0.6
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 组合净Delta上限(%)
    source: stress_scenario
    evidence: '情景压力库: Delta>30%在极端行情下亏损超日回撤硬限'
    last_validated: '2026-05-10'
  max_net_gamma_pct:
    type: float
    default: 0.08
    range:
    - 0.03
    - 0.2
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 组合净Gamma上限(%)
    source: stress_scenario
    evidence: '情景压力库: Gamma>8%在波动率飙升3σ时亏损超硬限'
    last_validated: '2026-05-10'
  max_net_vega_bps:
    type: float
    default: 0.02
    range:
    - 0.001
    - 0.1
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 组合净Vega上限(bps)
    source: stress_scenario
    evidence: '情景压力库: Vega>2bps在IV±50%时亏损超硬限'
    last_validated: '2026-05-10'
  max_theta_ratio:
    type: float
    default: 0.5
    range:
    - 0.05
    - 2.0
    layer: L_minus1_safety
    editable: runtime_readonly
    description: Theta比率上限
    source: intuition
    evidence: 0.5=时间衰减不超过权利金50%，待压力库验证
    last_validated: 待验证
  state_confirm_bars:
    type: int
    default: 5
    range:
    - 1
    - 10
    layer: L0_diagnosis
    editable: restart_required
    lock_mode: hyperparameter
    description: 状态切换确认bar数
    source: backtest_grid
    evidence: 'UPG-03修复: 统一为5，与state_param_sets.yaml/state_switch对齐'
    last_validated: '2026-05-25'
  state_check_interval_sec:
    type: float
    default: 180.0
    range:
    - 30.0
    - 600.0
    layer: L0_diagnosis
    editable: restart_required
    description: 状态检查间隔(秒)
    source: design
    evidence: 180s=半交易小时，平衡时效性与计算开销
    last_validated: '2026-05-10'
  min_state_hold_seconds:
    type: float
    default: 600.0
    range:
    - 60.0
    - 3600.0
    layer: L0_diagnosis
    editable: restart_required
    description: 状态最短保持时间(秒)，防抖
    source: goldilocks
    evidence: 10min=3×检查间隔，保证至少3次确认机会
    last_validated: '2026-05-10'
  option_width_min_threshold:
    type: float
    default: 4.0
    range:
    - 1.0
    - 10.0
    layer: L0_diagnosis
    editable: runtime_with_confirm
    description: 期权宽度最小阈值
    source: intuition
    evidence: 4.0=2个行权价间距，待独立数据集验证
    last_validated: 待验证
  non_other_ratio_threshold:
    type: float
    default: 0.65
    range:
    - 0.3
    - 0.9
    layer: L1_trading
    editable: runtime
    state_routed: true
    description: 非other状态占比阈值(correct+incorrect占比>=此值时启用状态路由增强)
    source: backtest_grid
    evidence: 'Round2辅助参数精扫: 0.65在样本外状态路由触发率最优(过低→噪声，过高→漏触发); 扩展至0.30覆盖极端行情低占比场景'
    last_validated: '2026-05-17'
    state_overrides:
      correct_trending: 0.55
      incorrect_reversal: 0.7
      other: 0.8
  logic_reversal_threshold:
    type: float
    default: 1.5
    range:
    - 1.0
    - 5.0
    layer: L1_trading
    editable: runtime
    description: 逻辑反转平仓阈值(wrong_pct > correct_pct * threshold时平仓)
    source: backtest_grid
    evidence: 'Round2: 1.5倍在样本外避免过早起跳，2.0倍过晚(回撤增30%)'
    last_validated: '2026-05-10'
  signal_cooldown_sec:
    type: float
    default: 60.0
    range:
    - 0.0
    - 600.0
    layer: L1_trading
    editable: runtime
    state_routed: true
    description: 信号冷却时间(秒)
    source: backtest_grid
    evidence: 'Round1: 60s在训练集夏普最优，0s次优但过拟合风险高'
    last_validated: '2026-05-10'
    state_overrides:
      correct_trending: 15.0
      incorrect_reversal: 120.0
      other: 300.0
  close_take_profit_ratio:
    type: float
    default: 1.8
    range:
    - 0.5
    - 5.0
    layer: L1_trading
    editable: runtime
    state_routed: true
    description: 止盈倍数
    source: quantified
    evidence: 'R24-P1-DF-07修复: 全局兜底默认值从1.5→1.8与V7手册S1对齐; Round1+Round2网格+反事实1000次打乱检验p<0.05'
    last_validated: '2026-05-27'
    state_overrides:
      correct_trending: 2.5
      incorrect_reversal: 1.3
      other: 1.1
    reason_overrides:
      CORRECT_RESONANCE: 1.5
      CORRECT_DIVERGENCE: 1.2
      INCORRECT_REVERSAL: 1.3
      OTHER_SCALP: 1.1
      BOX_SPRING: 5.0
  close_stop_loss_ratio:
    type: float
    default: 0.3
    range:
    - 0.1
    - 0.99
    layer: L1_trading
    editable: runtime
    state_routed: true
    description: 止损比例
    source: quantified
    evidence: 'R24-P0-DF-03修复: 默认值从0.5→0.3与V7.0手册§9.1对齐; Round1+Round2网格+反事实1000次打乱检验p<0.05'
    last_validated: '2026-05-27'
    state_overrides:
      correct_trending: 0.4
      incorrect_reversal: 0.6
      other: 0.8
    reason_overrides:
      CORRECT_RESONANCE: 0.5
      CORRECT_DIVERGENCE: 0.4
      INCORRECT_REVERSAL: 0.6
      OTHER_SCALP: 0.3
      BOX_SPRING: 0.95
  max_risk_ratio:
    type: float
    default: 0.8
    range:
    - 0.05
    - 1.0
    layer: L1_trading
    editable: runtime
    state_routed: true
    description: 最大风险比例
    source: backtest_grid
    evidence: 'R24-P0-DF-01修复: 全局兜底默认值从0.3→0.8与V7手册对齐; 0.8训练集最优'
    last_validated: '2026-05-27'
    state_overrides:
      correct_trending: 0.8
      incorrect_reversal: 0.3
      other: 0.2
  lots_min:
    type: int
    default: 3
    range:
    - 1
    - 50
    layer: L1_trading
    editable: runtime
    state_routed: true
    description: 最小开仓手数
    source: backtest_grid
    evidence: 'Round1: lots=3在训练集最优(流动性vs收益平衡)'
    last_validated: '2026-05-10'
    state_overrides:
      correct_trending: 5
      incorrect_reversal: 2
      other: 1
  max_signals_per_window:
    type: int
    default: 10
    range:
    - 1
    - 50
    layer: L1_trading
    editable: runtime
    state_routed: true
    description: 窗口内最大信号数
    source: backtest_grid
    evidence: 'R25对齐修复: default从5→10与config_params.py CENTRALIZED_DEFAULTS/DEFAULT_PARAM_TABLE对齐'
    last_validated: '2026-05-10'
    state_overrides:
      correct_trending: 10
      incorrect_reversal: 3
      other: 2
  option_buy_lots_min:
    type: int
    default: 1
    range:
    - 1
    - 10
    layer: L1_trading
    editable: runtime
    description: 期权最小买入手数
    source: design
    evidence: 交易所最小交易单位=1手
    last_validated: '2026-05-10'
  option_buy_lots_max:
    type: int
    default: 100
    range:
    - 1
    - 500
    layer: L1_trading
    editable: runtime
    description: 期权最大买入手数
    source: intuition
    evidence: 100手=5%账户权益的典型上限，待流动性压力测试
    last_validated: 待验证
  rate_limit_global_per_min:
    type: int
    default: 60
    range:
    - 10
    - 300
    layer: L2_rate
    editable: runtime
    description: 全局下单速率限制(次/分钟)
    source: backtest_grid
    evidence: 'Round2: 60/min最优，120/min过激(OOS衰减>35%)'
    last_validated: '2026-05-10'
  rate_limit_min_interval_sec:
    type: float
    default: 1.0
    range:
    - 0.1
    - 10.0
    layer: L2_rate
    editable: runtime
    description: 最小下单间隔(秒)
    source: design
    evidence: 1秒=交易所订单处理最小周期
    last_validated: '2026-05-10'
  stage1_min_minutes:
    type: float
    default: 90.0
    range:
    - 30.0
    - 240.0
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 两阶段硬时间止损-阶段1最小持仓分钟数
    source: backtest_grid
    evidence: 与resonance_hard_time_stop_min对齐，5min覆盖分钟级趋势确认窗口
    last_validated: '2026-05-10'
  stage1_profit_threshold:
    type: float
    default: 0.002
    range:
    - 0.0005
    - 0.01
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 两阶段硬时间止损-阶段1最大浮盈阈值(>=此值才进入阶段2)
    source: goldilocks
    evidence: 0.2%≈1tick最小跳动权益占比，金发姑娘测试确认0.05%-1%为有效区间
    last_validated: '2026-05-10'
  stage2_slope_window:
    type: int
    default: 10
    range:
    - 2
    - 30
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 两阶段硬时间止损-阶段2浮盈斜率监控窗口(Bar数)
    source: backtest_grid
    evidence: 10Bar=10分钟，覆盖最近价格趋势方向判断
    last_validated: '2026-05-10'
  stage2_slope_threshold:
    type: float
    default: 0.0
    range:
    - -0.005
    - 0.005
    layer: L_minus1_safety
    editable: runtime_readonly
    description: 两阶段硬时间止损-阶段2浮盈斜率阈值(斜率<此值触发平仓)
    source: goldilocks
    evidence: 0.0=中性阈值(浮盈不再增长即平仓)，负值允许浮盈小幅回撤后继续持有
    last_validated: '2026-05-10'
  shadow_alpha_threshold:
    type: float
    default: 0.1
    range:
    - -1.0
    - 1.0
    layer: subsystem_shadow
    editable: runtime
    description: 影子策略Alpha阈值
    source: intuition
    evidence: 0.0=中性门槛，待影子策略独立回测验证最优阈值
    last_validated: 待验证
  shadow_absolute_ev_floor:
    type: float
    default: -0.5
    range:
    - -2.0
    - 0.0
    layer: subsystem_shadow
    editable: runtime
    description: 影子策略绝对EV底线
    source: backtest_grid
    evidence: 'Round2辅助参数精扫: -0.5在样本外EV排名最优'
    last_validated: '2026-05-10'
  capital_route_master_base:
    type: float
    default: 0.6
    range:
    - 0.3
    - 0.8
    layer: subsystem_ecosystem
    editable: restart_required
    description: 主策略资金分配基数
    source: backtest_grid
    evidence: 'Round1: 0.60在训练集主策略夏普/总夏普比值最优'
    last_validated: '2026-05-10'
    constraint: capital_route_master_base + capital_route_reverse_base + capital_route_other_base
      = 1.0
  capital_route_reverse_base:
    type: float
    default: 0.25
    range:
    - 0.1
    - 0.4
    layer: subsystem_ecosystem
    editable: restart_required
    description: 反向策略资金分配基数
    source: backtest_grid
    evidence: 'Round1: 0.25配合master=0.60时总组合夏普最优'
    last_validated: '2026-05-10'
    constraint: 同上
  capital_route_other_base:
    type: float
    default: 0.15
    range:
    - 0.05
    - 0.3
    layer: subsystem_ecosystem
    editable: restart_required
    description: 震荡策略资金分配基数
    source: design
    evidence: 1 - master - reverse = 0.15，受资金守恒约束
    last_validated: '2026-05-10'
    constraint: 同上
  spring_iv_low_percentile:
    type: float
    default: 5.0
    range:
    - 1.0
    - 30.0
    layer: subsystem_spring
    editable: runtime
    description: 弹簧策略IV低百分位阈值
    source: goldilocks
    evidence: 5%分位=IV分布左尾极端低波动，金发姑娘测试确认3-10%为有效区间
    last_validated: '2026-05-10'
  spring_stop_profit_ratio:
    type: float
    default: 5.0
    range:
    - 2.0
    - 12.0
    layer: subsystem_spring
    editable: runtime
    description: 弹簧策略止盈倍数
    source: backtest_grid
    evidence: 'Round2精扫: 5.0倍在弹簧子策略样本外夏普最优'
    last_validated: '2026-05-10'
  spring_max_loss_pct:
    type: float
    default: 0.95
    range:
    - 0.5
    - 1.0
    layer: subsystem_spring
    editable: runtime
    description: 弹簧策略最大亏损比例(接受归零)
    source: design
    evidence: 0.95=接受权利金几乎归零，期权买方最大亏损=权利金100%
    last_validated: '2026-05-10'
  spring_max_position_pct:
    type: float
    default: 0.015
    range:
    - 0.005
    - 0.05
    layer: subsystem_spring
    editable: runtime
    description: 弹簧策略最大仓位占比
    source: backtest_grid
    evidence: 'Round2: 1.5%在弹簧子策略样本外收益/回撤比最优'
    last_validated: '2026-05-10'
  pullback_enabled:
    type: bool
    default: false
    layer: subsystem_pullback
    editable: runtime
    description: 回调入场策略开关
    source: backtest_grid
    evidence: 'Round1+Round2网格: pullback_enabled=True时夏普提升0.12但交易频率降40%'
    last_validated: '2026-05-10'
  pullback_wait_bars:
    type: int
    default: 5
    range:
    - 2
    - 10
    layer: subsystem_pullback
    editable: runtime
    description: 回调等待bar数(确认回调深度)
    source: backtest_grid
    evidence: 'Round1: wait_bars=5在训练集回调捕获率最优(2过短→噪声，10过长→错过入场)'
    last_validated: '2026-05-10'
  pullback_retrace_pct:
    type: float
    default: 0.15
    range:
    - 0.1
    - 0.9
    layer: subsystem_pullback
    editable: runtime
    description: 回调回撤百分比阈值(Call/Put共用)
    source: backtest_grid
    evidence: 'Round1: 0.15在训练集回调入场盈率最优，0.5以上过深回调≈趋势反转'
    last_validated: '2026-05-10'
  pullback_iv_min_percentile:
    type: float
    default: 20.0
    range:
    - 1.0
    - 80.0
    layer: subsystem_pullback
    editable: runtime
    description: 回调入场IV最低百分位(低于此值禁止回调入场)
    source: goldilocks
    evidence: 20%分位=排除IV极低区(流动性不足)，金发姑娘测试确认10-40%为有效区间
    last_validated: '2026-05-10'
  pullback_iv_max_percentile:
    type: float
    default: 80.0
    range:
    - 20.0
    - 99.0
    layer: subsystem_pullback
    editable: runtime
    description: 回调入场IV最高百分位(高于此值禁止回调入场)
    source: goldilocks
    evidence: 80%分位=排除IV极高区(隐含波动率飙升≈事件风险)，金发姑娘测试确认60-90%为有效区间
    last_validated: '2026-05-10'
  pullback_ref_mode:
    type: str
    default: peak
    range:
    - peak
    - atr
    layer: subsystem_pullback
    editable: runtime
    description: 回调参考模式(peak=峰值参考, atr=ATR动态参考)
    source: backtest_grid
    evidence: 'Round2: peak模式在趋势行情夏普最优，atr模式在震荡行情更稳健'
    last_validated: '2026-05-10'
  pullback_atr_wait_multiplier:
    type: float
    default: 0.0
    range:
    - 0.0
    - 10.0
    layer: subsystem_pullback
    editable: runtime
