spring_max_position_pct:
  type: float
  default: 0.015
  range: [0.005, 0.05]
  layer: subsystem_spring
  editable: runtime
  description: 弹簧策略最大仓位占比
  source: backtest_grid
  evidence: "Round2: 1.5%在弹簧子策略样本外收益/回撤比最优"
  last_validated: 2026-05-10

# =============================================================================
# 工程模式参数
# =============================================================================

debug_mode:
  type: bool
  default: false
  layer: engineering
  editable: restart_required
  description: 调试模式开关(放宽限流/增强日志)
  source: design
  evidence: "工程调试开关，生产环境必须关闭"
  last_validated: 2026-05-10
  side_effects:
    - rate_limit_global_per_min: 300
    - signal_cooldown_sec: 0.0
    - debug_output: true

stress_test_mode:
  type: bool
  default: false
  layer: engineering
  editable: restart_required
  description: 压力测试模式(模拟极端行情)
  source: design
  evidence: "工程压力测试开关，生产环境必须关闭"
  last_validated: 2026-05-10
  side_effects:
    - circuit_breaker_trigger_sigma: 10.0
    - max_net_delta_pct: 1.0
    - max_net_gamma_pct: 0.50
    - max_net_vega_bps: 0.10

# =============================================================================
# 路由优先级定义（显式声明，消除歧义）
# =============================================================================
#
# 路由优先级规则（数值越大优先级越高）：
#   1. reason_overrides（开仓理由级，P3）—— 最精细粒度，直接决定资金盈亏
#   2. state_overrides（状态级，P2）—— 中等粒度，按市场状态分组
#   3. default（默认值，P1）—— 兜底值
#
# 解析顺序：reason_overrides > state_overrides > default
# 此优先级确保：开仓理由存在专属配置时绝不降级到状态级或默认值

route_priority:
  reason_overrides: 3
  state_overrides: 2
  default: 1
  description: "reason_overrides > state_overrides > default"

# =============================================================================
# 互斥规则
# =============================================================================

mutual_exclusion:
  rules:
    - [debug_mode, stress_test_mode]
  description: 调试模式和压力测试模式不可同时开启

# =============================================================================
# 参数依赖关系
# =============================================================================

dependencies:
  circuit_breaker_calm_period_sec:
    requires: circuit_breaker_pause_sec
    constraint: "calm_period >= pause_sec"
  spring_stop_profit_ratio:
    requires: spring_max_loss_pct
    constraint: "stop_profit_ratio * (1 - max_loss_pct) > 1.0"
