# =============================================================================
# 路由优先级定义（显式声明，消除歧义）
# =============================================================================
#
# 路由优先级规则（数值越大优先级越高）：
#   1. reason_overrides（开仓理由级，P3）—— 最精细粒度，直接决定资金盈亏
#   2. state_overrides（状态级，P2）—— 中等粒度，按市场状态分组
#   3. default（默认值，P1）—— 兜底值
#
# 解析顺序：reason_overrides > state_overrides > default
# 此优先级确保：开仓理由存在专属配置时绝不降级到状态级或默认值

route_priority:
  reason_overrides: 3
  state_overrides: 2
  default: 1
  description: "reason_overrides > state_overrides > default"

# =============================================================================
# 互斥规则
# =============================================================================

mutual_exclusion:
  rules:
    - [debug_mode, stress_test_mode]
  description: 调试模式和压力测试模式不可同时开启

# =============================================================================
# 参数依赖关系
# =============================================================================

dependencies:
  circuit_breaker_calm_period_sec:
    requires: circuit_breaker_pause_sec
    constraint: "calm_period >= pause_sec"
  spring_stop_profit_ratio:
    requires: spring_max_loss_pct
    constraint: "stop_profit_ratio * (1 - max_loss_pct) > 1.0"
  pullback_atr_wait_multiplier:
    requires: pullback_ref_mode
    constraint: "pullback_ref_mode=atr时multiplier>0，否则multiplier=0"
  pullback_retrace_pct_call:
    requires: pullback_retrace_pct
    constraint: "null时回退到pullback_retrace_pct"
  pullback_retrace_pct_put:
    requires: pullback_retrace_pct
    constraint: "null时回退到pullback_retrace_pct"
  pullback_iv_min_percentile:
    requires: pullback_iv_max_percentile
    constraint: "iv_min_percentile < iv_max_percentile"
  pullback_wait_bars:
    requires: pullback_enabled
    constraint: "pullback_enabled=True时wait_bars>=2"
