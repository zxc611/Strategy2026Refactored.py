pullback_max_valid_bars:
  type: int
  default: 24
  range: [5, 60]
  layer: subsystem_pullback
  editable: runtime
  description: 回调信号最大有效等待bar数(超过则信号过期失效)
  source: backtest_grid
  evidence: "物理约束: max_valid_bars>=wait_bars+2且<=hard_time_stop/10; 24≈4小时(6min/bar)覆盖半日回调窗口"
  last_validated: 2026-05-17
  depends_on:
    - param: pullback_wait_bars
      constraint: "max_valid_bars >= wait_bars + 2"
    - param: hard_time_stop_minutes
      constraint: "max_valid_bars <= hard_time_stop_minutes / 10"

