    source: design
    evidence: "三角验证中Calmar权重0.3/1.0"
    last_validated: "2026-05-20"

  scoring_sharpe_weight:
    default: 0.30
    type: float
    range: [0.10, 0.50]
    layer: L0_judgment
    editable: runtime_readonly
    description: "三角验证Sharpe权重(三角内部归一化)"
    source: design
    evidence: "三角验证中Sharpe权重0.3/1.0"
