    source: backtest_grid
    evidence: "Round2: 0.0=禁用ATR等待"
    last_validated: "2026-05-10"

  pullback_retrace_pct_call:
    default: null
    type: optional_float
    range: [0.1, 0.9]
    layer: subsystem_pullback
    editable: runtime
    description: "Call方向专用回调回撤百分比(null时使用pullback_retrace_pct)"
    source: intuition
    evidence: "null=Call/Put共用回撤阈值，待独立回测确定Call方向最优值"
    last_validated: "待验证"

  pullback_retrace_pct_put:
    default: null
    type: optional_float
    range: [0.1, 0.9]
    layer: subsystem_pullback
    editable: runtime
    description: "Put方向专用回调回撤百分比(null时使用pullback_retrace_pct)"
    source: intuition
    evidence: "null=Call/Put共用回撤阈值，待独立回测确定Put方向最优值"
    last_validated: "待验证"

  pullback_theta_decay_accel:
    default: 0.0
    type: float
    range: [0.0, 2.0]
    layer: subsystem_pullback
    editable: runtime
    description: "Theta衰减加速因子(>0时时间衰减加速回调入场判定)"
    source: backtest_grid
    evidence: "Round2辅助参数精扫: 0.0=禁用衰减加速"
    last_validated: "2026-05-10"

  pullback_min_retrace_abs:
    default: 0.0
    type: float
    range: [0.0, 2.0]
    layer: subsystem_pullback
    editable: runtime
    description: "回调最小绝对回撤(点数，0=不设下限)"
    source: backtest_grid
    evidence: "Round2辅助参数精扫: 0.0=不设下限"
    last_validated: "2026-05-10"

  pullback_max_valid_bars:
    default: 24
    type: int
    range: [5, 60]
    layer: subsystem_pullback
    editable: runtime
    description: "回调信号最大有效等待bar数(超过则信号过期失效)"
    source: backtest_grid
    evidence: "24≈4小时(6min/bar)覆盖半日回调窗口"
    last_validated: "2026-05-17"
    depends_on:
      - param: pullback_wait_bars
        constraint: "max_valid_bars >= wait_bars + 2"
      - param: resonance_hard_time_stop_min
        constraint: "max_valid_bars <= resonance_hard_time_stop_min / 10"

