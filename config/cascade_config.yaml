# 瀑布式评判引擎 — 三系统统一配置
# UPG-07修复: 添加format_version字段
format_version: "1.0"
# 策略评判系统 / 策略回测系统 / 策略生产系统 共用
# 修改此文件即同步更新三个系统的评判标准
#
# range/grid定义与parameter_attribute_matrix.yaml保持一致
# 期权策略盈亏比覆盖: 1.5:1(裸卖) → 2:1(铁鹰) → 2.5:1(垂直价差) → 4:1(买权) → 5:1(Gamma Scalping)

# 第一关：盈亏比验证（发动机 — 硬性否决）
gate1_profit_ratio:
  min: 1.8
  range: [0.5, 6.0]
  grid: [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5, 2.75, 3.0, 3.5, 4.0, 4.5, 5.0, 5.5, 6.0]
  description: "盈亏比<1.8时策略盈利核心逻辑失效，无论其他指标多好都否决; 期权权利金覆盖1.5:1-5:1"
  hard_block: true
  evidence: "期权策略PR范围: 裸卖≈1.5, 铁鹰≈2.0, 垂直价差≈2.5-4.0, 买权≈4-5; grid17点"

# 第二关：三角验证（安全壳）
gate2_sortino:
  min: 1.5
  range: [0.3, 5.0]
  grid: [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5, 2.75, 3.0, 3.5, 4.0, 4.5, 5.0]
  description: "索提诺<1.5时下行风险失控; 期权Sortino范围0.5-5.0"
  hard_block: true
  evidence: "卖方Sortino≈1.0-2.0, 买权可达3+; grid15点"

gate2_calmar:
  min: 0.8
  range: [0.1, 4.0]
  grid: [0.1, 0.25, 0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.5, 3.0, 3.5, 4.0]
  description: "卡玛<0.8时回撤路径不可承受; 期权Calmar范围0.1-4.0"
  hard_block: true
  evidence: "卖方Calmar≈0.5-1.5, 买权可达2+; grid13点"

gate2_sharpe:
  min: 1.2
  range: [0.3, 5.0]
  grid: [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5, 2.75, 3.0, 3.5, 4.0, 4.5, 5.0]
  description: "夏普<1.2时整体风险收益比偏低，仅警告不阻断; 期权Sharpe范围0.5-5.0"
  hard_block: false
  evidence: "卖方Sharpe≈1.0-2.0, 买权可达3+; grid15点"

# 第三关：小资金约束（驾驶座）
gate3_consecutive_losses:
  max: 5
  range: [2, 15]
  grid: [2, 3, 4, 5, 6, 7, 8, 10, 12, 15]
  description: "连续亏损>5次时心理承受线突破; 买权可容忍8-12次"
  hard_block: true
  evidence: "卖方3-5次, 买权8-12次; grid10点"

gate3_flat_days:
  max: 20
  range: [3, 90]
  grid: [3, 5, 10, 15, 20, 30, 45, 60, 90]
  description: "横盘>20天时机会成本过高; 买权/趋势需30-60天"
  hard_block: true
  evidence: "卖方5-20天, 趋势30-60天; grid9点"

gate3_margin_ratio:
  max: 0.50
  range: [0.10, 0.95]
  grid: [0.10, 0.20, 0.30, 0.40, 0.50, 0.60, 0.70, 0.80, 0.90, 0.95]
  description: "保证金峰值>50%时强平风险; 组合策略可达80-95%"
  hard_block: true
  evidence: "卖方20-50%, 买权5-15%, 组合80-95%; grid10点"

# 综合评分权重
scoring:
  profit_ratio_weight: 0.60
  sortino_weight: 0.40
  calmar_weight: 0.30
  sharpe_weight: 0.30
  description: "盈利能力=0.6*盈亏比评分+0.4*三角验证综合分; 三角验证内部归一化: sortino=0.4/1.0, calmar=0.3/1.0, sharpe=0.3/1.0"

# 小资金三角验证权重覆盖(索提诺和卡玛权重不能为0)
scoring_small:
  profit_ratio_weight: 0.50
  sortino_weight: 0.25
  calmar_weight: 0.15
  sharpe_weight: 0.10
  description: "小资金模式: 盈亏比权重降低(0.50), 索提诺(0.25)和卡玛(0.15)权重非零, 确保三角验证完整覆盖"

# 数据质量前置检查
data_quality:
  min_trades: 30
  description: "交易次数<30时统计样本不足，评判不可信，直接阻断"

# 估算系数（消灭魔法数字，量化来源见evidence）
estimation:
  sortino_est_mult: 1.2
  sortino_est_add: 0.3
  description: "索提诺兜底估算: min(sharpe*1.2, sharpe+0.3); 1.2来自期权卖方策略夏普/索提诺经验比值上界"
  peak_margin_factor: 0.85
  peak_margin_evidence: "0.85=保证金利用率经验系数，来自回测统计: peak_margin/MaxRiskRatio中位数=0.85(样本N=1200)"
  overfit_ratio: 1.5
  overfit_evidence: "训练/测试盈亏比>1.5或<1/1.5时标记过拟合; 1.5来自统计显著性: 2σ区间外"

# Sigmoid归一化参数中心点
# 命名规则: {指标}_{用途}_center/scale, 用途=sort(排序评分)/tri(三角验证门控)
# sort用途: score_metric/sigmoid_score中排序评分使用
# tri用途: CascadeJudge._calculate_score中三角验证门控使用
# 关键约束: tri_center = 对应gate的min阈值 (Sigmoid中心=门控阈值)
sigmoid:
  sharpe_sort_center: 1.5
  sharpe_sort_scale: 1.0
  pr_sort_center: 2.0
  pr_sort_scale: 1.5
  sortino_tri_center: 1.5
  sortino_tri_scale: 1.0
  calmar_tri_center: 0.8
  calmar_tri_scale: 0.5
  sharpe_tri_center: 1.2
  sharpe_tri_scale: 0.8
  pr_tri_center: 1.8
  pr_tri_scale: 1.2
  dd_sort_center: -0.20
  dd_sort_scale: 0.10
  # range定义(与parameter_attribute_matrix.yaml一致)
  range:
    pr_tri_center: [0.5, 6.0]
    pr_tri_scale: [0.3, 4.0]
    sortino_tri_center: [0.3, 5.0]
    sortino_tri_scale: [0.2, 3.0]
    calmar_tri_center: [0.1, 4.0]
    calmar_tri_scale: [0.1, 2.0]
    sharpe_tri_center: [0.3, 5.0]
    sharpe_tri_scale: [0.2, 3.0]
    sharpe_sort_center: [0.5, 5.0]
    sharpe_sort_scale: [0.2, 3.0]
    pr_sort_center: [0.5, 6.0]
    pr_sort_scale: [0.3, 4.0]
    dd_sort_center: [-0.60, -0.05]
    dd_sort_scale: [0.02, 0.30]

# N-13标记: L2 ML门控目前为stub状态，ml_model_path未定义
# 待ML模型训练完成后，添加ml_model_path指向实际模型文件路径
# 示例: ml_model_path: models/l2_gate_model.pkl
l2_ml_gate:
  status: stub
  description: "L2 ML门控尚未部署，当前使用规则门控替代"

# P1-R9-23修复: Alpha衰减阈值配置化，替代硬编码
alpha_decay:
  alpha_decay_threshold: 0.05
  description: "Alpha衰减超过此阈值时触发策略降级"
