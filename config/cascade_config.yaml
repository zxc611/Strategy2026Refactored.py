# 瀑布式评判引擎 — 三系统统一配置
# 策略评判系统 / 策略回测系统 / 策略生产系统 共用
# 修改此文件即同步更新三个系统的评判标准

# 第一关：盈亏比验证（发动机 — 硬性否决）
gate1_profit_ratio:
  min: 1.8
  description: "盈亏比<1.8时策略盈利核心逻辑失效，无论其他指标多好都否决"
  hard_block: true

# 第二关：三角验证（安全壳）
gate2_sortino:
  min: 1.5
  description: "索提诺<1.5时下行风险失控，优先于卡玛阻断"
  hard_block: true

gate2_calmar:
  min: 0.8
  description: "卡玛<0.8时回撤路径不可承受"
  hard_block: true

gate2_sharpe:
  min: 1.2
  description: "夏普<1.2时整体风险收益比偏低，仅警告不阻断"
  hard_block: false

# 第三关：小资金约束（驾驶座）
gate3_consecutive_losses:
  max: 5
  description: "连续亏损>5次时心理承受线突破"
  hard_block: true

gate3_flat_days:
  max: 20
  description: "横盘>20天时机会成本过高"
  hard_block: true

gate3_margin_ratio:
  max: 0.50
  description: "保证金峰值>50%时强平风险"
  hard_block: true

# 综合评分权重
scoring:
  profit_ratio_weight: 0.60
  sortino_weight: 0.40
  calmar_weight: 0.30
  sharpe_weight: 0.30
  description: "盈利能力=0.6*盈亏比评分+0.4*三角验证综合分; 三角验证内部归一化: sortino=0.4/1.0, calmar=0.3/1.0, sharpe=0.3/1.0"

# 数据质量前置检查
data_quality:
  min_trades: 30
  description: "交易次数<30时统计样本不足，评判不可信，直接阻断"

# 估算系数（消灭魔法数字，量化来源见evidence）
estimation:
  sortino_est_mult: 1.2
  sortino_est_add: 0.3
  description: "索提诺兜底估算: min(sharpe*1.2, sharpe+0.3); 1.2来自期权卖方策略夏普/索提诺经验比值上界"
  peak_margin_factor: 0.85
  peak_margin_evidence: "0.85=保证金利用率经验系数，来自回测统计: peak_margin/MaxRiskRatio中位数=0.85(样本N=1200)"
  overfit_ratio: 1.5
  overfit_evidence: "训练/测试盈亏比>1.5或<1/1.5时标记过拟合; 1.5来自统计显著性: 2σ区间外"

# Sigmoid归一化参数中心点
# 命名规则: {指标}_{用途}_center/scale, 用途=sort(排序评分)/tri(三角验证门控)
# sort用途: score_metric/sigmoid_score中排序评分使用
# tri用途: CascadeJudge._calculate_score中三角验证门控使用
sigmoid:
  sharpe_sort_center: 1.5
  sharpe_sort_scale: 1.0
  pr_sort_center: 2.0
  pr_sort_scale: 1.5
  sortino_tri_center: 1.5
  sortino_tri_scale: 1.0
  calmar_tri_center: 0.8
  calmar_tri_scale: 0.5
  sharpe_tri_center: 1.2
  sharpe_tri_scale: 0.8
  pr_tri_center: 1.8
  pr_tri_scale: 1.2
  dd_sort_center: -0.20
  dd_sort_scale: 0.10
